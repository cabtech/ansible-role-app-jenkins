---
- name: 'repo key'
  apt_key:
    url: 'https://pkg.jenkins.io/debian/jenkins.io.key'
    validate_certs: true
    state: '{{jenkins_state}}'
  become: true
  tags:
  - jenkins
  - jenkins-repo

- name: 'APT source file'
  template:
    src: jenkins.list.j2
    dest: /etc/apt/sources.list.d/jenkins.list
    owner: root
    group: root
    mode: '0644'
  become: true
  tags:
  - jenkins
  - jenkins-repo

- name: 'package'
  apt:
    name: jenkins
    update_cache: true
    state: '{{jenkins_state}}'
  become: true
  tags:
  - jenkins
  - jenkins-pkg
...
